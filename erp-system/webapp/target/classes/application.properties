server.port=${ERP_WEB_PORT:8081}

spring.datasource.url=${ERP_DB_URL:jdbc:mysql://localhost:3306/erp_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ERP_DB_USER:root}
spring.datasource.password=${ERP_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.connection-timeout=10000

spring.thymeleaf.cache=false

server.servlet.session.timeout=30m
